# Project-local cargo configuration.

[alias]
xtask = "run --package xtask --release --"
ci = "run --package xtask --release -- ci"
fmt-all = "fmt --all"
lint = "clippy --workspace --all-targets --all-features -- -D warnings"
test-all = "test --workspace --all-features"
docs = "doc --workspace --no-deps --all-features"

[build]
# Reproducibility: avoid implicit network features. Leave target unset so the
# default host triple is used.

[net]
retry = 3
git-fetch-with-cli = true
